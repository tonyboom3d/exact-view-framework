<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: store the full URL and redirect to index
      sessionStorage.redirect = location.href;
      location.replace(
        location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '') +
        '/exact-view-framework/'
      );
    </script>
  </head>
  <body></body>
</html>
